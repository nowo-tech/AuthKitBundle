        mismatch: The password fields must match.
        required: Please enter a password.
        min_length: Your password should be at least {{ limit }} characters.
        field:
            password: New password
            password_confirm: Confirm new password
    code:
        title: Complete password reset
        heading: Enter your code
        help: Enter the identifier and the code you received (SMS, email, or authenticator).
        submit: Update password
        request_new: Request a new code
        back_to_login: Back to sign in
        flash_invalid: The code is invalid or has expired.
        identifier_required: Please enter your identifier.
        code_required: Please enter the code.
        code_length: The code must be exactly {{ limit }} characters.
