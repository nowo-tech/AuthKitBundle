name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.4', '8.0', '8.1']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.2'
            symfony: '8.1'
          - php: '8.3'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.1'

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: pcov
          tools: composer:v2

      - run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require \
            symfony/framework-bundle:^${{ matrix.symfony }} \
            symfony/security-bundle:^${{ matrix.symfony }} \
            symfony/form:^${{ matrix.symfony }} \
            symfony/twig-bundle:^${{ matrix.symfony }} \
            symfony/translation:^${{ matrix.symfony }} \
            symfony/routing:^${{ matrix.symfony }} \
            symfony/validator:^${{ matrix.symfony }} \
            --no-interaction --no-update
          composer update --with-all-dependencies --no-interaction --prefer-dist

      - run: composer test

      - name: Validate 100% coverage
        if: matrix.php == '8.2' && matrix.symfony == '7.4'
        run: |
          composer test-coverage
          php -r "
          \$coverage = simplexml_load_file('coverage.xml');
          \$metrics = \$coverage->project->metrics;
          \$percentage = ((float)\$metrics['coveredelements'] / (float)\$metrics['elements']) * 100;
          if (\$percentage < 100) { echo \"Coverage: \$percentage%\n\"; exit(1); }
          echo \"✅ 100% coverage\n\";
          "

  code-style-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - run: composer update --prefer-dist --no-interaction
      - run: composer cs-check
      - run: composer phpstan
      - run: php vendor/bin/yaml-lint src/Resources/translations

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json
          coverage: pcov
          tools: composer:v2
      - run: composer update --prefer-dist --no-interaction
      - run: composer test-coverage
      - run: |
          php -r "
          \$coverage = simplexml_load_file('coverage.xml');
          \$metrics = \$coverage->project->metrics;
          \$percentage = ((float)\$metrics['coveredelements'] / (float)\$metrics['elements']) * 100;
          if (\$percentage < 100) { echo \"Coverage: \$percentage%\n\"; exit(1); }
          "
