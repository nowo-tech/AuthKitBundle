security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: nowo_auth_kit_login
                check_path: nowo_auth_kit_login
                default_target_path: demo_home
                enable_csrf: true
            logout:
                path: nowo_auth_kit_logout
                target: nowo_auth_kit_login

    access_control:
        - { path: ^/(en|es)/login, roles: PUBLIC_ACCESS }
        - { path: ^/(en|es)/register, roles: PUBLIC_ACCESS }
        - { path: ^/(en|es)/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/(en|es)/reset-password/reset, roles: PUBLIC_ACCESS }
        - { path: ^/(en|es)/reset-password/complete, roles: PUBLIC_ACCESS }
        - { path: ^/(en|es)/home, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
